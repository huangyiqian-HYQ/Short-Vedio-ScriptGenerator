<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频脚本生成器 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            min-height: 100vh;
        }
        
        .login-container {
            display: flex;
            height: 100vh;
            position: relative;
        }
        
        .bg-left {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: white;
        }
        
        .bg-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        
        .bg-decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        
        .bg-decoration:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .bg-decoration:nth-child(2) {
            bottom: 20%;
            right: 15%;
            animation-delay: 2s;
            width: 150px;
            height: 150px;
        }
        
        .bg-decoration:nth-child(3) {
            top: 50%;
            left: 60%;
            animation-delay: 4s;
            width: 100px;
            height: 100px;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .brand-section {
            z-index: 1;
            text-align: center;
            padding: 40px;
        }
        
        .brand-icon {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            font-size: 48px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .brand-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        
        .brand-desc {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .feature-list {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        
        .feature-item {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            min-width: 100px;
        }
        
        .feature-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .feature-text {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .form-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
            position: relative;
        }
        
        .form-card {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .form-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .form-subtitle {
            font-size: 14px;
            color: #64748b;
        }
        
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        
        .form-group.focused label {
            color: #667eea;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .form-group.focused .input-icon {
            color: #667eea;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group input::placeholder {
            color: #94a3b8;
        }
        
        .password-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .remember-me input {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            accent-color: #667eea;
        }
        
        .remember-me label {
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
        }
        
        .forgot-link {
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .forgot-link:hover {
            color: #764ba2;
        }
        
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #cbd5e1;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        
        .divider span {
            padding: 0 16px;
            font-size: 13px;
        }
        
        .guest-btn {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #64748b;
        }
        
        .guest-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .auth-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
        }
        
        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .auth-link a:hover {
            color: #764ba2;
        }
        
        #alert-container {
            margin-top: 20px;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }
        
        .alert-success {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #dc2626;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }
            
            .bg-left {
                padding: 40px 20px;
                min-height: 40vh;
            }
            
            .brand-title {
                font-size: 28px;
            }
            
            .brand-desc {
                font-size: 15px;
            }
            
            .feature-list {
                gap: 15px;
            }
            
            .feature-item {
                min-width: 80px;
                padding: 15px;
            }
            
            .form-card {
                padding: 30px 25px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="bg-left">
            <div class="bg-decoration"></div>
            <div class="bg-decoration"></div>
            <div class="bg-decoration"></div>
            
            <div class="brand-section">
                <div class="brand-icon">🎬</div>
                <h1 class="brand-title">短视频脚本生成器</h1>
                <p class="brand-desc">智能创作，一键生成专业短视频脚本<br>让你的创意轻松落地</p>
                
                <div class="feature-list">
                    <div class="feature-item">
                        <div class="feature-icon">✨</div>
                        <div class="feature-text">智能生成</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🎨</div>
                        <div class="feature-text">多样模板</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⚡</div>
                        <div class="feature-text">高效便捷</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="form-right">
            <div class="form-card">
                <div class="form-header">
                    <h2 class="form-title">欢迎回来</h2>
                    <p class="form-subtitle">请登录你的账号</p>
                </div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" placeholder="请输入密码" required>
                        </div>
                        <div class="password-hint">密码长度6-20位，建议包含字母和数字</div>
                    </div>
                    
                    <div class="remember-forgot">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">记住账号</label>
                        </div>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="btn-primary">登录</button>
                    
                    <div class="divider"><span>或</span></div>
                    
                    <button type="button" class="guest-btn" onclick="guestLogin()">
                        游客免登录进入
                    </button>
                    
                    <p class="auth-link">
                        还没有账号？<a href="register.html">立即注册</a>
                    </p>
                </form>
                
                <div id="alert-container"></div>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedUsername = localStorage.getItem('saved_username');
            const savedPassword = localStorage.getItem('saved_password');
            const rememberChecked = localStorage.getItem('remember_checked');
            
            if (rememberChecked === 'true') {
                document.getElementById('username').value = savedUsername || '';
                document.getElementById('password').value = savedPassword || '';
                document.getElementById('remember').checked = true;
            }
            
            const inputs = document.querySelectorAll('.form-group input');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.parentElement.classList.add('focused');
                });
                input.addEventListener('blur', function() {
                    this.parentElement.parentElement.classList.remove('focused');
                });
            });
        });
        
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            if (password.length < 6 || password.length > 20) {
                showAlert('密码长度需为6-20位', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    localStorage.setItem('access_token', result.data.access_token);
                    localStorage.setItem('user_info', JSON.stringify(result.data.user));
                    
                    if (remember) {
                        localStorage.setItem('saved_username', username);
                        localStorage.setItem('saved_password', password);
                        localStorage.setItem('remember_checked', 'true');
                    } else {
                        localStorage.removeItem('saved_username');
                        localStorage.removeItem('saved_password');
                        localStorage.setItem('remember_checked', 'false');
                    }
                    
                    showAlert('登录成功', 'success');
                    setTimeout(() => {
                        window.location.href = 'create.html';
                    }, 1000);
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('登录失败，请检查网络连接', 'error');
            }
        });
        
        function guestLogin() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_info');
            localStorage.setItem('is_guest', 'true');
            
            showAlert('已进入游客模式', 'success');
            setTimeout(() => {
                window.location.href = 'create.html';
            }, 500);
        }
    </script>
</body>
</html>
